<html lang="zh-TW">
<head>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#0a0a0a;overflow:hidden;font-family:'Share Tech Mono',monospace;color:#ddd;user-select:none;touch-action:none;}

    #crt{pointer-events:none;position:fixed;inset:0;z-index:1000;

         background-size:100% 4px,3px 100%;opacity:0.6;}
    #vignette{pointer-events:none;position:fixed;inset:0;z-index:900;
      background:radial-gradient(circle at center,transparent 20%,rgba(0,0,0,0.95) 100%);}
      
    #cur{position:fixed;width:50px;height:50px;border:1px dashed rgba(255,255,255,0.3);border-radius:50%;
      z-index:700;pointer-events:none;transform:translate(-50%,-50%);
      transition:border-color 0.3s,background 0.3s,width 0.3s,height 0.3s;}
    #cur.active{width:70px;height:70px;border-color:rgba(255,255,255,0.5);border-style:solid;
      background:radial-gradient(circle,rgba(255,255,255,0.08) 0%,transparent 70%);
      box-shadow:0 0 20px rgba(255,255,255,0.2);}
      
    #container{width:100vw;height:100vh;cursor:crosshair;}
    
    #btn-toggle-panel{position:fixed;left:20px;top:20px;z-index:850;
      background:rgba(8,8,8,0.9);border:1px solid #fff;color:#fff;

    #btn-toggle-panel:hover{background:#fff;color:#000;}

      z-index:800;display:flex;flex-direction:column;gap:10px;pointer-events:none;
      transition:transform 0.4s cubic-bezier(0.4,0,0.2,1),opacity 0.4s;}
    .panel{background:rgba(8,8,8,0.9);border-left:2px solid #fff;
      padding:12px;pointer-events:auto;box-shadow:0 0 15px rgba(0,0,0,0.8);}
    .label{font-size:10px;color:rgba(255,255,255,0.4);letter-spacing:2px;margin-bottom:8px;display:block;}
    
    #video{width:100%;filter:grayscale(100%) contrast(1.2) brightness(0.4);border:1px solid rgba(255,255,255,0.1);}
    #mc{position:fixed;bottom:-999px;left:-999px;opacity:0;pointer-events:none;}

    /* 即時預覽 */
    #dream-preview-wrap{margin-top:8px;position:relative;}

    #dream-canvas{width:100%;border:1px solid rgba(255,255,255,0.15);image-rendering:pixelated;}

    #log-box{flex:1;font-size:9px;color:rgba(255,255,255,0.7);overflow-y:auto;line-height:1.6;}
    #scan-status{font-size:10px;color:#fff;margin-top:10px;border-top:1px dashed rgba(255,255,255,0.3);padding-top:10px;line-height:1.8;}
    
    #controls{position:fixed;right:20px;bottom:20px;z-index:950;display:flex;flex-direction:column;align-items:flex-end;gap:12px;}
    .knob-wrap{display:flex;flex-direction:column;align-items:center;gap:6px;}
    .knob{width:46px;height:46px;border-radius:50%;border:1px solid rgba(255,255,255,0.4);
      position:relative;cursor:ns-resize;background:radial-gradient(circle,#333 0%,#000 70%);
      box-shadow:0 5px 10px rgba(0,0,0,0.5);}
    .needle{position:absolute;width:2px;height:45%;background:#fff;
      bottom:50%;left:calc(50% - 1px);transform-origin:bottom center;transition:transform 0.1s;}
      
    #status-bar{position:fixed;bottom:20px;left:260px;font-size:9px;color:rgba(255,255,255,0.3);letter-spacing:1px;z-index:800;transition:transform 0.4s;}
    
    #cycle-indicator{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:850;display:flex;gap:8px;align-items:center;}
    .cycle-dot{width:8px;height:8px;border-radius:50%;border:1px solid rgba(255,255,255,0.3);transition:all 0.5s;}
    .cycle-dot.active{background:#fff;border-color:#fff;box-shadow:0 0 8px #fff;}
    .cycle-dot.c2.active{background:rgba(190,190,190,1);box-shadow:0 0 6px rgba(190,190,190,0.5);}
    .cycle-dot.c3.active{background:rgba(160,160,160,1);box-shadow:0 0 6px rgba(160,160,160,0.5);}
    .cycle-dot.c4.active{background:rgba(90,90,90,1);box-shadow:0 0 6px rgba(120,120,120,0.5);}
    .cycle-dot.c5.active{background:rgba(50,50,50,1);box-shadow:0 0 6px rgba(80,80,80,0.4);}
    
    #ai-pipeline-badge{position:fixed;right:20px;top:20px;z-index:850;
      font-size:8px;letter-spacing:1px;padding:4px 8px;border:1px solid rgba(255,255,255,0.2);
      background:rgba(0,0,0,0.8);color:rgba(255,255,255,0.4);transition:all 0.3s;}
    #ai-pipeline-badge.active{border-color:rgba(0,255,150,0.6);color:rgba(0,255,150,0.8);box-shadow:0 0 10px rgba(0,255,150,0.2);}

    @media(max-width:768px){
      #status-bar{left:20px;}
      #controls{right:15px;bottom:15px;transform:scale(0.85);transform-origin:bottom right;}
      #sidebar{top:60px;width:200px;}
      #cycle-indicator{top:auto;bottom:60px;}
    }
    /* 橫式手機適配 */
    @media (max-height: 500px) and (orientation: landscape) {
      #controls { flex-direction: row; align-items: flex-end; bottom: 15px; right: env(safe-area-inset-right, 20px); transform: scale(0.85); transform-origin: bottom right; }
      #sidebar { top: 60px; width: 200px; }
    }
    
    #loading-overlay{position:fixed;inset:0;background:#000;z-index:2000;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 1s;}
    .pulse{animation:pulse 1.5s infinite;color:#fff;}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
  </style>

<script>
/**
 * SELF_OBSERVER v67.0 - Pure Monochrome Archive
 * 修復重點：
 * 1. 徹底移除 Thermal (熱成像色彩)，確保所有視覺為純灰階。
 * 2. 恢復並擴展 6 種底層灰階濾鏡 (邊緣、點陣、雜訊、閾值、斷層、高反差)。
 * 3. 繪製 AI 圖片時強制套用 `ctx.filter = 'grayscale(100%)'`，杜絕 AI 產生彩色幻覺。
 * 4. 利用 multiply, overlay 與不同底色的相紙創造真實厚重感。
 */

// ============================================================
// AI Prompt 亂數詞庫 (強制黑白)
// ============================================================
const PROMPT_FRAGMENTS = {
  subjects: ["biometric face scan", "neural network tissue", "digital skull anatomy", "glitch identity silhouette", "synthetic eye macro", "cybernetic bone structure", "latent space portrait", "surveillance ghost"],
  styles: ["high contrast x-ray", "graphite sketch", "dark medical blueprint", "electron microscope B&W", "lithograph precise lines", "datamosh corrupted file", "clinical surveillance camera", "ink wash style"],
  c4_absurd: ["clock made of teeth", "staircase merging with spine", "eye filled with radio waves", "typewriter melting into ribcage", "telephone receiver of bone", "door handle shaped like human ear"],
  c5_abstract: ["concept of forgetting", "static electricity anatomy", "machine hallucination strata", "recursive impossible room", "shadow of nonexistent geometry", "signal without medium"]
};

function generateUniquePrompt(cycle) {
  const seed = Math.floor(Math.random() * 999999);
  let base = "";
  if (cycle === 4) {
    base = PROMPT_FRAGMENTS.c4_absurd[Math.floor(Math.random() * PROMPT_FRAGMENTS.c4_absurd.length)];
  } else if (cycle === 5) {
    base = PROMPT_FRAGMENTS.c5_abstract[Math.floor(Math.random() * PROMPT_FRAGMENTS.c5_abstract.length)];
  } else {
    const sub = PROMPT_FRAGMENTS.subjects[Math.floor(Math.random() * PROMPT_FRAGMENTS.subjects.length)];
    const sty = PROMPT_FRAGMENTS.styles[Math.floor(Math.random() * PROMPT_FRAGMENTS.styles.length)];
    base = `${sub}, ${sty}`;
  }
  // 強制灰階、無色彩指令
  return `${base}, pure monochrome, grayscale only, dark black and white, extreme contrast, no color, sharp lines --seed_${seed}`;
}

// ============================================================
// 視覺風格與混合模式定義 (專為黑白層次設計)
// ============================================================
const DREAM_CYCLES = {
  1: { label: "RAW_CAPTURE", color: "rgba(215,215,215,0.9)", paperTone: "#e8e8e8", blendRatio: 0.0, compositeOp: "multiply" },
  2: { label: "DATA_GHOST", color: "rgba(170,170,170,0.9)", paperTone: "#c0c0c0", blendRatio: 0.40, compositeOp: "multiply" },
  3: { label: "NOISE_DISSOLVE", color: "rgba(120,120,120,0.9)", paperTone: "#909090", blendRatio: 0.60, compositeOp: "overlay" },
  4: { label: "ABSURD_VISION", color: "rgba(75,75,75,0.92)", paperTone: "#505050", blendRatio: 0.85, compositeOp: "screen" },
  5: { label: "PURE_SIMULACRA", color: "rgba(42,42,42,0.95)", paperTone: "#1f1f1f", blendRatio: 1.0, compositeOp: "screen" }
};

const MODE_NAMES = ["TOPOLOGICAL_EDGE", "DITHER_MATRIX", "THRESHOLD_GLITCH", "NEURAL_NOISE", "QUANTIZED_PIXEL", "HIGH_CONTRAST"];

// ============================================================
// 6 種純黑白底層演算法 (在 AI 下載前，確保每張照片各有特色)
// ============================================================
function applyMonochromeFilter(imgData, modeIndex) {
  const data = imgData.data;
  const copy = new Uint8ClampedArray(data); // 用於卷積與偏移參考

  for (let i = 0; i < data.length; i += 4) {
    let r = data[i], g = data[i + 1], b = data[i + 2];
    let lum = 0.299 * r + 0.587 * g + 0.114 * b;
    let noise = (Math.random() - 0.5) * 30;

    if (modeIndex === 0) { 
      // 0: TOPOLOGICAL_EDGE (邊緣提取)
      let rIdx = i + 4, bIdx = i + 108 * 4;
      let rLum = rIdx < data.length ? (0.299*copy[rIdx] + 0.587*copy[rIdx+1] + 0.114*copy[rIdx+2]) : lum;
      let bLum = bIdx < data.length ? (0.299*copy[bIdx] + 0.587*copy[bIdx+1] + 0.114*copy[bIdx+2]) : lum;
      let val = (Math.abs(lum - rLum) + Math.abs(lum - bLum)) > 15 ? 240 : 20; 
      data[i] = data[i+1] = data[i+2] = val;
    } 
    else if (modeIndex === 1) { 
      // 1: DITHER_MATRIX (隨機點陣)
      let val = (lum + (Math.random() - 0.5) * 120) > 128 ? 250 : 15;
      data[i] = data[i+1] = data[i+2] = val;
    } 
    else if (modeIndex === 2) { 
      // 2: THRESHOLD_GLITCH (斷層與高反差)
      let pxIdx = (Math.random() > 0.95) ? i + Math.floor(Math.random() * 8) * 4 : i;
      if (pxIdx < data.length) {
        let sLum = 0.299*copy[pxIdx] + 0.587*copy[pxIdx+1] + 0.114*copy[pxIdx+2];
        data[i] = data[i+1] = data[i+2] = sLum > 110 ? 240 : 10;
      }
    } 
    else if (modeIndex === 3) { 
      // 3: NEURAL_NOISE (神經雪花雜訊)
      let val = lum * (Math.random() * 1.5) + noise;
      data[i] = data[i+1] = data[i+2] = val > 150 ? 240 : (val < 50 ? 10 : val);
    } 
    else if (modeIndex === 4) { 
      // 4: QUANTIZED_PIXEL (像素量化)
      data[i] = data[i+1] = data[i+2] = Math.floor((lum + noise) / 85) * 85;
    }
    else if (modeIndex === 5) { 
      // 5: HIGH_CONTRAST (極端對比)
      let val = lum > 100 ? (lum + 50) : (lum - 50);
      data[i] = data[i+1] = data[i+2] = Math.min(255, Math.max(0, val));
    }
  }
}

// ============================================================
// 獨立相紙顯影系統 (Lazy Developer Queue)
// ============================================================
let devQueue = [];
let activeFetches = 0;
let devStats = { developing: 0, resolved: 0 };

function enqueueDeveloping(mesh, tileCtx, tex, rawImgData, cycle, isBlank, localMode) {
  // C1 或異常空白，不向 AI 請求
  if (cycle === 1 || isBlank) {
    drawPolaroid(tileCtx, rawImgData, isBlank, null, cycle, "RESOLVED");
    tex.needsUpdate = true;
    return;
  }

  const prompt = generateUniquePrompt(cycle);
  const seed = Math.floor(Math.random() * 9999999);
  
  devQueue.push({ mesh, tileCtx, tex, rawImgData, cycle, prompt, seed, localMode });
  devStats.developing++;
  updateDevUI();
  processDevQueue();
}

function processDevQueue() {
  if (activeFetches >= 4 || devQueue.length === 0) return;
  
  const task = devQueue.shift();
  activeFetches++;
  document.getElementById('ai-pipeline-badge').classList.add('active');
  document.getElementById('ai-pipeline-badge').innerText = `FETCHING_${activeFetches}...`;

  const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(task.prompt)}?width=128&height=128&nologo=true&seed=${task.seed}&model=turbo&enhance=false`;
  
  const img = new Image();
  img.crossOrigin = "anonymous";
  
  img.onload = () => {
    drawPolaroid(task.tileCtx, task.rawImgData, false, img, task.cycle, "RESOLVED");
    task.tex.needsUpdate = true;
    
    // 顯影彈跳特效
    if (mosaicGroup.children.includes(task.mesh)) {
      task.mesh.position.z += 0.2;
      setTimeout(() => { if(task.mesh) task.mesh.position.z -= 0.2; }, 300);
    }

    activeFetches--;
    devStats.developing--;
    devStats.resolved++;
    addLog(`[AI_RESOLVED] C${task.cycle} :: ${task.prompt.substring(0, 15).toUpperCase()}...`, "rgba(100,255,150,0.6)");
    updateDevUI();
    processDevQueue();
  };
  
  img.onerror = () => {
    activeFetches--;
    devStats.developing--;
    updateDevUI();
    processDevQueue();
  };
  
  img.src = url;
}

function updateDevUI() {
  document.getElementById('ui-dev').innerText = devStats.developing;
  document.getElementById('ui-res').innerText = devStats.resolved;
  if(activeFetches === 0) {
    document.getElementById('ai-pipeline-badge').classList.remove('active');
    document.getElementById('ai-pipeline-badge').innerText = `DEVELOPER_IDLE`;
  }
}

// ============================================================
// 繪製單張相紙 (核心：強制過濾色彩、繪製寫實陰影)
// ============================================================
const tempCanvas = document.createElement('canvas'); tempCanvas.width=108; tempCanvas.height=108;
const tempCtx = tempCanvas.getContext('2d', {willReadFrequently:true});

function drawPolaroid(ctx, rawImgData, isBlank, aiImg, cycle, statusText) {
  ctx.clearRect(0, 0, 160, 180);
  const config = DREAM_CYCLES[cycle];
  const isDark = cycle >= 4;
  const tone = config.paperTone;

  // 實體落影
  ctx.shadowColor = isDark ? 'rgba(0,0,0,0.95)' : 'rgba(0,0,0,0.6)';
  ctx.shadowBlur = 12; ctx.shadowOffsetX = 3; ctx.shadowOffsetY = 6;
  ctx.fillStyle = isBlank ? '#888' : tone;
  ctx.fillRect(16, 12, 128, 148);
  ctx.shadowColor = 'transparent';

  // 紙張雜訊
  const noiseCount = isDark ? 400 : 200;
  for(let i=0; i<noiseCount; i++){
    ctx.fillStyle = isDark ? `rgba(255,255,255,${Math.random()*0.08})` : `rgba(0,0,0,${Math.random()*0.06})`;
    ctx.fillRect(16 + Math.random()*128, 12 + Math.random()*148, 2, 2);
  }

  if (!isBlank && rawImgData) {
    // 繪製底層攝影機 (已經在 captureNextSector 被 6 種濾鏡之一處理過了)
    tempCtx.putImageData(rawImgData, 0, 0);
    
    ctx.globalAlpha = cycle >= 4 ? 0.2 : 1.0; 
    ctx.globalCompositeOperation = 'source-over';
    ctx.drawImage(tempCanvas, 24, 20, 112, 112);
    ctx.globalAlpha = 1.0;

    // 疊加 AI 顯影影像
    if (aiImg && config.blendRatio > 0) {
      // 【關鍵修復】：強制對 AI 影像套用 100% 灰階濾鏡，杜絕任何彩色漏出！
      ctx.filter = 'grayscale(100%) contrast(1.1)';
      ctx.globalAlpha = config.blendRatio;
      ctx.globalCompositeOperation = config.compositeOp;
      ctx.drawImage(aiImg, 24, 20, 112, 112);
      ctx.globalAlpha = 1.0;
      ctx.globalCompositeOperation = 'source-over';
      ctx.filter = 'none'; // 恢復
    }
  }

  // 文字標籤
  ctx.fillStyle = isDark ? 'rgba(200,200,200,0.6)' : 'rgba(0,0,0,0.6)';
  ctx.font = 'bold 7px "Share Tech Mono"';
  let label = isBlank ? "ANOMALY_DETECTED" : `C${cycle} // ${statusText}`;
  if(aiImg && statusText === "RESOLVED") label += " // AI_SYNCED";
  ctx.fillText(label, 24, 150);

  // 膠帶
  ctx.save();
  ctx.translate(80, 18); ctx.rotate((Math.random()-0.5)*0.3);
  ctx.shadowColor='rgba(0,0,0,0.4)'; ctx.shadowBlur=4; ctx.shadowOffsetY=2;
  const tapes = ['rgba(205,205,195,0.7)','rgba(170,170,160,0.7)','rgba(120,120,112,0.7)','rgba(75,75,68,0.7)','rgba(45,45,40,0.7)'];
  ctx.fillStyle = tapes[cycle-1] || tapes[0];
  ctx.fillRect(-20, -8, 40, 14);
  ctx.restore();
}

// ============================================================
// 核心系統初始化與物理引擎
// ============================================================
let video, motionCanvas, motionCtx, dreamPreviewCtx;
let scene, camera, renderer, mosaicGroup;
let baseTiles = [], cellStacks = [], blownPapers = [];

const TOTAL_TILES = 144; const MAX_CYCLES = 5;
let COLS = 12, ROWS = 12;
let currentIndex = 0, totalActiveLayers = 0, globalFilterMode = 0;
let speedRatio = 0.5, isPaused = false;
let lastCaptureTime = 0, lastTime = performance.now();

let prevFrame = null;
const vs = { cx: innerWidth/2, cy: innerHeight/2, tx: innerWidth/2, ty: innerHeight/2 };
let mouseVx = 0, mouseVy = 0, lastMouseTime = 0;

const paperGeo = new THREE.PlaneBufferGeometry(0.85, 0.95);
const baseGeo  = new THREE.PlaneBufferGeometry(0.7, 0.8);

const updateMouse = (x, y) => {
  lastMouseTime = Date.now();
  mouseVx = x - vs.tx; mouseVy = y - vs.ty;
  vs.tx = x; vs.ty = y;
  document.getElementById('cur').classList.add('active');
};
window.addEventListener('mousemove', e => updateMouse(e.clientX, e.clientY));
window.addEventListener('touchmove', e => updateMouse(e.touches[0].clientX, e.touches[0].clientY), {passive:false});
setInterval(() => { if (Date.now()-lastMouseTime>500) document.getElementById('cur').classList.remove('active'); }, 500);

function bindBtn(id, cb) {
  const el = document.getElementById(id); if (!el) return;
  let t = false;
  const h = (e) => { e.preventDefault(); e.stopPropagation(); if(t) return; t=true; cb(); setTimeout(()=>t=false,300); };
  el.addEventListener('touchstart', h, {passive:false}); el.addEventListener('click', h);
}

let panelVisible = window.innerWidth > 768;
const updatePanelUI = () => {
  const sb = document.getElementById('sidebar'), btn = document.getElementById('btn-toggle-panel');
  if (panelVisible) {
    sb.style.transform='translateX(0)'; sb.style.opacity='1'; sb.style.pointerEvents='auto'; btn.innerText='[-] HIDE_LOG';
  } else {
    sb.style.transform='translateX(-120%)'; sb.style.opacity='0'; sb.style.pointerEvents='none'; btn.innerText='[+] SHOW_LOG';
  }
};
bindBtn('btn-toggle-panel', () => { panelVisible=!panelVisible; updatePanelUI(); });

function calculateGridLayout() {
  const asp = Math.max(0.4, Math.min(2.5, innerWidth/innerHeight));
  COLS = Math.max(1, Math.round(Math.sqrt(TOTAL_TILES * asp)));
  ROWS = Math.ceil(TOTAL_TILES / COLS);
}

async function init() {
  updatePanelUI();
  video = document.getElementById('video');
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video:{width:640,height:640}, audio:false });
    video.srcObject = stream; await video.play();
  } catch(e) { addLog("CAMERA_ERROR: "+e.message,"#f33"); }

  calculateGridLayout();
  motionCanvas = document.getElementById('mc'); motionCtx = motionCanvas.getContext('2d', {willReadFrequently:true});
  dreamPreviewCtx = document.getElementById('dream-canvas').getContext('2d', {willReadFrequently:true});

  scene = new THREE.Scene(); scene.fog = new THREE.FogExp2(0x0a0a0a, 0.03);
  camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.1, 1000); camera.position.z = 16;
  renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
  renderer.setSize(innerWidth, innerHeight); renderer.setPixelRatio(devicePixelRatio);
  renderer.shadowMap.enabled = false;
  document.getElementById('container').appendChild(renderer.domElement);

  scene.add(new THREE.AmbientLight(0xffffff, 0.8));
  const dl = new THREE.DirectionalLight(0xffffff, 0.8); dl.position.set(3, 10, 15); scene.add(dl);
  const wall = new THREE.Mesh(new THREE.PlaneGeometry(100,100), new THREE.MeshStandardMaterial({color:0x050505,roughness:0.8}));
  wall.position.z = -1; scene.add(wall);

  createBaseGrid(); fitGridToScreen();

  document.getElementById('loading-overlay').style.opacity='0';
  setTimeout(()=>document.getElementById('loading-overlay').remove(), 1000);
  addLog("MONOCHROME_DEVELOPER_READY","#fff");
  animate();
}

function fitGridToScreen() {
  if (!mosaicGroup) return;
  const vFov = camera.fov*Math.PI/180, vH = 2*Math.tan(vFov/2)*camera.position.z, vW = vH*camera.aspect;
  const margin = innerWidth<768 ? 0.95 : 0.85;
  mosaicGroup.scale.setScalar(Math.min((vW*margin)/COLS, (vH*margin)/ROWS));
}

function createBaseGrid() {
  mosaicGroup = new THREE.Group();
  const step=1.0, sx=-(COLS-1)*step/2, sy=(ROWS-1)*step/2;
  for (let i=0; i<TOTAL_TILES; i++) {
    const x=i%COLS, y=Math.floor(i/COLS);
    const mesh = new THREE.Mesh(baseGeo, new THREE.MeshBasicMaterial({visible:false}));
    const bx=sx+x*step, by=sy-y*step;
    mesh.position.set(bx, by, 0);
    baseTiles.push({x:bx,y:by,z:0,windCharge:0});
    cellStacks.push([]); mosaicGroup.add(mesh);
  }
  scene.add(mosaicGroup);
}

const tileCycleMap = {};
function assignCycleForTile(cellIndex, stackLen) {
  const roll = Math.random(); let cycle;
  if (roll < 0.35) cycle = 1; else if (roll < 0.60) cycle = 2; else if (roll < 0.80) cycle = 3; else if (roll < 0.92) cycle = 4; else cycle = 5;
  tileCycleMap[cellIndex] = cycle; return cycle;
}

function captureNextSector() {
  if (video.readyState < 2) return;
  if (currentIndex >= TOTAL_TILES * MAX_CYCLES) { addLog(`MAX_CAPACITY AUTO-PURGING`,"#f00"); wipeBoard(); return; }

  const cellIndex = currentIndex % TOTAL_TILES;
  const cell = baseTiles[cellIndex];
  const stack = cellStacks[cellIndex];
  const cycle = assignCycleForTile(cellIndex, stack.length);

  if (stack.length >= 6) {
    const old = stack.shift(); totalActiveLayers--;
    old.userData.vx=(Math.random()-0.5)*0.03; old.userData.vy=(Math.random()-0.5)*0.03; old.userData.vz=0.05;
    blownPapers.push(old);
  }

  const isBlank = Math.random() < 0.04;
  let rawImgData = null;
  const currentLocalMode = globalFilterMode;

  if (!isBlank && video.videoWidth > 0) {
    const minSize = Math.min(video.videoWidth, video.videoHeight);
    const cropSize = minSize * (0.5 + Math.random()*0.5);
    tempCtx.drawImage(video, Math.random()*(video.videoWidth-cropSize), Math.random()*(video.videoHeight-cropSize), cropSize, cropSize, 0, 0, 108, 108);
    rawImgData = tempCtx.getImageData(0, 0, 108, 108);
    
    // 【關鍵修復】在此處對影像施加 6 種不同的黑白底層濾鏡
    applyMonochromeFilter(rawImgData, currentLocalMode);
  }

  const tileCanvas = document.createElement('canvas'); tileCanvas.width = 160; tileCanvas.height = 180;
  const tileCtx = tileCanvas.getContext('2d');
  
  drawPolaroid(tileCtx, rawImgData, isBlank, null, cycle, isBlank?"NULL":"DEVELOPING...");
  
  const tex = new THREE.CanvasTexture(tileCanvas); tex.minFilter = THREE.LinearFilter;
  const mat = new THREE.MeshBasicMaterial({map:tex, transparent:true, side:THREE.DoubleSide});
  const mesh = new THREE.Mesh(paperGeo, mat);

  const ox=(Math.random()-0.5)*0.15, oy=(Math.random()-0.5)*0.15, tilt=(Math.random()-0.5)*0.25, zOff=(stack.length+1)*0.05;
  mesh.position.set(cell.x+ox, cell.y+oy, cell.z+zOff); mesh.rotation.z=tilt;
  mesh.userData={baseX:mesh.position.x,baseY:mesh.position.y,baseZ:mesh.position.z,baseTilt:tilt,
    targetRotX:0,targetZ:mesh.position.z,targetRotY:0,noiseSeed:Math.random()*100};
  mesh.rotation.x=Math.PI; mesh.position.z+=1.0;

  mosaicGroup.add(mesh); stack.push(mesh);
  totalActiveLayers++; currentIndex++;

  enqueueDeveloping(mesh, tileCtx, tex, rawImgData, cycle, isBlank, currentLocalMode);

  // UI 更新
  const dominantCycle = Object.values(tileCycleMap).reduce((a,b,i,arr)=>
    (arr.filter(v=>v===a).length>=arr.filter(v=>v===b).length?a:b), 1);
  for (let i=1;i<=5;i++) document.getElementById(`dot-${i}`).classList.remove('active');
  document.getElementById(`dot-${dominantCycle}`).classList.add('active');
  document.getElementById('ui-cycle').innerText = `MIX_C${cycle}`;
  document.getElementById('ui-progress').innerText = totalActiveLayers;
  
  // 循環 6 種濾鏡模式
  if (!isBlank) globalFilterMode = (globalFilterMode + 1) % 6;
}

function wipeBoard() {
  cellStacks.forEach(s => { s.forEach(p=>{ mosaicGroup.remove(p); if(p.material.map)p.material.map.dispose(); p.material.dispose(); }); s.length=0; });
  blownPapers.forEach(p=>{ mosaicGroup.remove(p); if(p.material.map)p.material.map.dispose(); p.material.dispose(); });
  blownPapers.length=0; totalActiveLayers=0; currentIndex=0; devQueue=[]; activeFetches=0;
  for(let i=1;i<=5;i++) document.getElementById(`dot-${i}`).classList.remove('active');
  document.getElementById('dot-1').classList.add('active');
  document.getElementById('ui-cycle').innerText='1/5 RESET'; document.getElementById('ui-progress').innerText='0'; document.getElementById('ui-scattered').innerText='0';
  addLog("DESK_CLEARED // DEVELOPER_QUEUE_FLUSHED","#f00");
}

function animate() {
  requestAnimationFrame(animate);
  const now = performance.now(); const delta = (now-lastTime)*0.001; lastTime = now; const time = now*0.001;

  const interval = 80+(1-speedRatio)*600;
  if (!isPaused && Date.now()-lastCaptureTime > interval) { captureNextSector(); lastCaptureTime = Date.now(); }

  // 即時預覽框更新 (顯示目前的黑白濾鏡效果)
  if (video && video.readyState>=2 && Math.random()<0.1) {
    dreamPreviewCtx.drawImage(video, 0, 0, 108, 108);
    let prevData = dreamPreviewCtx.getImageData(0,0,108,108);
    applyMonochromeFilter(prevData, globalFilterMode);
    dreamPreviewCtx.putImageData(prevData, 0, 0);
  }

  // 動態追蹤
  if (Date.now()-lastMouseTime>1000 && motionCtx) {
    if (video && video.readyState>=2) {
      motionCtx.drawImage(video, 0, 0, motionCanvas.width, motionCanvas.height);
      const curr = motionCtx.getImageData(0,0,motionCanvas.width,motionCanvas.height);
      if (prevFrame) {
        let tx=0,ty=0,count=0;
        for(let i=0;i<curr.data.length;i+=4){
          const diff=(Math.abs(curr.data[i]-prevFrame.data[i])+Math.abs(curr.data[i+1]-prevFrame.data[i+1])+Math.abs(curr.data[i+2]-prevFrame.data[i+2]))/3;
          if(diff>30){const idx=i/4;tx+=idx%motionCanvas.width;ty+=Math.floor(idx/motionCanvas.width);count++;}
        }
        if(count>15){
          vs.tx=(1-(tx/count/motionCanvas.width))*innerWidth; vs.ty=(ty/count/motionCanvas.height)*innerHeight;
          document.getElementById('cur').classList.add('active');
        } else { document.getElementById('cur').classList.remove('active'); }
      }
      if(!prevFrame) prevFrame=new ImageData(motionCanvas.width,motionCanvas.height);
      prevFrame.data.set(curr.data);
    }
  }

  vs.cx+=(vs.tx-vs.cx)*0.15; vs.cy+=(vs.ty-vs.cy)*0.15;
  let vel=Math.sqrt(mouseVx*mouseVx+mouseVy*mouseVy); mouseVx*=0.7; mouseVy*=0.7;

  const vFov=camera.fov*Math.PI/180, vH=2*Math.tan(vFov/2)*camera.position.z, vW=vH*camera.aspect;
  const margin=innerWidth<768?0.95:0.85, scale=Math.min((vW*margin)/COLS,(vH*margin)/ROWS);
  const wx=(((vs.cx/innerWidth)*2-1)*(vW/2))/scale, wy=(-((vs.cy/innerHeight)*2-1)*(vH/2))/scale;

  const blowR=2.0, PEEL=0.8;

  for(let i=0;i<TOTAL_TILES;i++){
    const cell=baseTiles[i], stack=cellStacks[i];
    if(stack.length>0){
      const top=stack[stack.length-1];
      const dx=cell.x-wx, dy=cell.y-wy, dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<blowR){
        let stab=Math.max(0.2,1.0-vel*0.05); cell.windCharge+=delta*stab*(1.5-dist/blowR);
      } else { cell.windCharge=Math.max(0,cell.windCharge-delta*0.8); }
      const cr=Math.min(1,cell.windCharge/PEEL);
      if(cr>0&&cr<1){top.userData.targetZ=top.userData.baseZ+cr*0.2;top.userData.targetRotX=Math.sin(time*25+top.userData.noiseSeed)*0.08*cr;}
      else{top.userData.targetZ=top.userData.baseZ;top.userData.targetRotX=0;}
      
      if(cell.windCharge>=PEEL){
        stack.pop(); totalActiveLayers--; document.getElementById('ui-progress').innerText=totalActiveLayers;
        top.userData.vx=-(dx/dist)*0.02+(Math.random()-0.5)*0.015; top.userData.vy=-(dy/dist)*0.02+(Math.random()-0.5)*0.015;
        top.userData.vz=0.05; top.userData.rvX=(Math.random()-0.5)*0.02; top.userData.rvY=(Math.random()-0.5)*0.02; top.userData.rvZ=(Math.random()-0.5)*0.06;
        blownPapers.push(top); cell.windCharge=0;
      }
    }
    stack.forEach((p,idx)=>{
      const u=p.userData; let rX=u.targetRotX,tZ=u.targetZ; if(idx!==stack.length-1){rX=0;tZ=u.baseZ;}
      p.rotation.x+=(rX-p.rotation.x)*0.15; p.rotation.y+=(u.targetRotY-p.rotation.y)*0.15; p.rotation.z=u.baseTilt; p.position.z+=(tZ-p.position.z)*0.15;
    });
  }

  for(let i=0;i<blownPapers.length;i++){
    const p=blownPapers[i],u=p.userData;
    if(p.position.z>u.baseZ-0.1){u.vz-=0.005;}else{p.position.z=u.baseZ-0.1;u.vz=0;u.vx*=0.7;u.vy*=0.7;u.rvX*=0.7;u.rvY*=0.7;u.rvZ*=0.8;}
    p.position.x+=u.vx; p.position.y+=u.vy; p.position.z+=u.vz;
    p.rotation.x+=u.rvX; p.rotation.y+=u.rvY; p.rotation.z+=u.rvZ;
  }
  document.getElementById('ui-scattered').innerText=blownPapers.length;
  if(blownPapers.length>60){
    const old=blownPapers.shift(); mosaicGroup.remove(old); if(old.material.map)old.material.map.dispose(); old.material.dispose();
  }

  document.getElementById('cur').style.left=vs.cx+'px'; document.getElementById('cur').style.top=vs.cy+'px';
  renderer.render(scene,camera);
}

function addLog(m, color="rgba(255,255,255,0.7)") {
  const lb=document.getElementById('log-box'), d=document.createElement('div'); d.style.color=color;
  d.innerHTML=`> <span style="opacity:0.3">${new Date().toLocaleTimeString()}</span> ${m}`;
  lb.prepend(d); if(lb.children.length>35) lb.lastChild.remove();
}

bindBtn('btn-pause',()=>{
  isPaused=!isPaused; const btn=document.getElementById('btn-pause');
  if(isPaused){
    btn.innerText="RESUME"; btn.className="w-11 h-11 border border-[#f00] text-[#f00] hover:bg-[#f00] hover:text-black transition-all text-[8px] font-bold tracking-widest";
    addLog("GENERATION_PAUSED","#f00");
  } else {
    btn.innerText="PAUSE"; btn.className="w-11 h-11 border border-[#0f0] text-[#0f0] hover:bg-[#0f0] hover:text-black transition-all text-[8px] font-bold tracking-widest";
    addLog("GENERATION_RESUMED","#0f0");
  }
});

function setupKnob(id, cb, initVal=0.5) {
  const knob=document.getElementById(id), needle=knob.querySelector('.needle'); let dragging=false,startY=0,val=initVal;
  const update=(y)=>{val=Math.max(0,Math.min(1,val+(startY-y)*0.005));needle.style.transform=`rotate(${val*280-140}deg)`;cb(val);startY=y;};
  knob.addEventListener('mousedown',(e)=>{dragging=true;startY=e.clientY;});
  window.addEventListener('mousemove',(e)=>{if(dragging)update(e.clientY);}); window.addEventListener('mouseup',()=>{dragging=false;});
  knob.addEventListener('touchstart',(e)=>{dragging=true;startY=e.touches[0].clientY;},{passive:true});
  window.addEventListener('touchmove',(e)=>{if(dragging)update(e.touches[0].clientY);},{passive:true});
  window.addEventListener('touchend',()=>{dragging=false;});
  needle.style.transform=`rotate(${initVal*280-140}deg)`;
}

setupKnob('knob-speed',(v)=>{speedRatio=v;}, 0.5);
bindBtn('btn-wipe',()=>wipeBoard());

window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); fitGridToScreen();
});

window.onload=init;
</script>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>SELF_OBSERVER :: v60.0 DELICATE_PEEL_ARCHIVE</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#0a0a0a;overflow:hidden;font-family:'Share Tech Mono',monospace;color:#ddd;user-select:none;touch-action:none;}

    #crt{pointer-events:none;position:fixed;inset:0;z-index:1000;
         background:linear-gradient(rgba(0,0,0,0) 50%, rgba(255,255,255,0.02) 50%),
                    linear-gradient(90deg, rgba(255,255,255,0.01), rgba(200,200,200,0.01));
         background-size:100% 4px, 3px 100%; opacity:0.6;}
         
    #vignette {
      pointer-events:none;position:fixed;inset:0;z-index:900;
      background: radial-gradient(circle at center, transparent 20%, rgba(0,0,0,0.95) 100%);
    }

    /* 物理互動光環：變得更遲緩、柔和 */
    #cur {
      position:fixed; width:60px; height:60px; border:1px dashed rgba(255,255,255,0.2); border-radius:50%;
      z-index:700; pointer-events:none; transform:translate(-50%,-50%);
      transition: border-color 0.8s, background 0.8s, width 0.8s, height 0.8s;
      box-shadow: 0 0 20px rgba(255,255,255,0);
    }
    #cur.active {
      width:70px; height:70px; border-color:rgba(255,255,255,0.4); border-style: solid;
      background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
      box-shadow: 0 0 20px rgba(255,255,255,0.1);
    }

    #container{width:100vw;height:100vh; cursor:crosshair;}

    #sidebar{
      position:fixed; left:20px; top:20px; bottom:20px; width:220px;
      z-index:800; display:flex; flex-direction:column; gap:10px; pointer-events:none;
    }
    .panel{
      background:rgba(8,8,8,0.9); border-left:2px solid #fff;
      padding:12px; pointer-events:auto; box-shadow: 0 0 15px rgba(0,0,0,0.8);
    }
    .label{font-size:10px; color:rgba(255,255,255,0.4); letter-spacing:2px; margin-bottom:8px; display:block;}
    
    #video { width: 100%; filter: grayscale(100%) contrast(1.2) brightness(0.4); border: 1px solid rgba(255,255,255,0.1); }
    #mc { position:absolute; bottom:20px; left:20px; opacity:0; pointer-events:none; }
    
    #log-box{flex:1; font-size:9px; color:rgba(255,255,255,0.7); overflow-y:auto; line-height:1.6;}
    #scan-status { font-size: 10px; color: #fff; margin-top: 10px; border-top: 1px dashed rgba(255,255,255,0.3); padding-top: 10px; }

    #controls{
      position:fixed; right:30px; bottom:30px; z-index:950;
      display:flex; flex-direction:column; align-items:flex-end; gap:20px;
    }
    .knob-wrap{display:flex; flex-direction:column; align-items:center; gap:8px;}
    .knob{
      width:60px; height:60px; border-radius:50%; border:1px solid rgba(255,255,255,0.4);
      position:relative; cursor:ns-resize; background:radial-gradient(circle, #333 0%, #000 70%);
      box-shadow: 0 5px 10px rgba(0,0,0,0.5);
    }
    .needle{
      position:absolute; width:2px; height:45%; background:#fff;
      bottom:50%; left:calc(50% - 1px); transform-origin:bottom center;
      transition: transform 0.1s;
    }

    #status-bar{
      position:fixed; bottom:20px; left:260px; font-size:9px;
      color:rgba(255,255,255,0.3); letter-spacing:1px; z-index: 800;
    }

    #loading-overlay {
      position: fixed; inset: 0; background: #000; z-index: 2000;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      transition: opacity 1s;
    }
    .pulse { animation: pulse 1.5s infinite; color: #fff; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  </style>
</head>
<body>

<div id="loading-overlay">
  <div class="pulse text-xs tracking-[0.5em] mb-4">INITIALIZING_DELICATE_PEEL...</div>
  <div id="load-status" class="text-[10px] text-gray-500 font-mono">CALIBRATING_SENSITIVITY</div>
</div>

<div id="crt"></div>
<div id="vignette"></div>
<div id="cur"></div>

<div id="sidebar">
  <div class="panel">
    <span class="label">OPTICAL_SUBJECT</span>
    <video id="video" playsinline muted autoplay></video>
    <canvas id="mc" width="100" height="75"></canvas>
    <div id="scan-status">
      ACTIVE_STACKS: <span id="ui-progress">0</span><br>
      SCATTERED_DEBRIS: <span id="ui-scattered">0</span><br>
      MODE: <span id="ui-mode">WAITING</span>
    </div>
  </div>
  <div class="panel flex-1">
    <span class="label">OBSERVATION_LOG</span>
    <div id="log-box"></div>
  </div>
</div>

<div id="controls">
  <div class="knob-wrap">
    <span class="label">PRINT_SPEED</span>
    <div class="knob" id="knob-speed"><div class="needle" id="needle-speed"></div></div>
  </div>
  <div class="knob-wrap">
    <span class="label">CLEAR_DESK</span>
    <button id="btn-wipe" class="w-14 h-14 border border-white text-white hover:bg-white hover:text-black transition-all text-[9px] font-bold tracking-widest shadow-[0_5px_10px_rgba(0,0,0,0.5)]">RST</button>
  </div>
</div>

<div id="status-bar">v60.0_DELICATE_PEEL_ARCHIVE // GENTLE_INTERVENTION_REQUIRED</div>

<div id="container"></div>

<script>
/**
 * SELF_OBSERVER v60.0 - Delicate Peel Archive
 * 核心：極低反應的掀紙互動、紙張散落不消失的桌面物理。
 */

let video, hiddenCanvas, hiddenCtx, tempCanvas, tempCtx;
let scene, camera, renderer, mosaicGroup;
let baseTiles = []; 
let cellStacks = []; 
let blownPapers = []; 

const GRID_SIZE = 12;
const TOTAL_TILES = GRID_SIZE * GRID_SIZE; 
const BASE_GRID_SIZE = 10; 
let currentIndex = 0;
let currentMode = 0;
let totalActiveLayers = 0;

let speedRatio = 0.5;
let lastCaptureTime = 0;
let lastTime = performance.now();

// 互動與動態追蹤
let prevFrame = null;
const vs = { cx: window.innerWidth/2, cy: window.innerHeight/2, tx: window.innerWidth/2, ty: window.innerHeight/2 };
let mouseVx = 0, mouseVy = 0; 
let lastMouseTime = 0;

const MODE_NAMES = ["TOPOLOGICAL_EDGE", "DITHER_MATRIX", "THRESHOLD_SLICE", "NEURAL_NOISE", "QUANTIZED_PIXEL"];

const paperGeo = new THREE.PlaneBufferGeometry((BASE_GRID_SIZE/GRID_SIZE)*0.80, (BASE_GRID_SIZE/GRID_SIZE)*0.80);

const updateMouse = (x, y) => {
  lastMouseTime = Date.now();
  mouseVx = x - vs.tx;
  mouseVy = y - vs.ty;
  vs.tx = x;
  vs.ty = y;
  document.getElementById('cur').classList.add('active');
};

window.addEventListener('mousemove', e => updateMouse(e.clientX, e.clientY));
window.addEventListener('touchmove', e => {
  updateMouse(e.touches[0].clientX, e.touches[0].clientY);
}, {passive: false});

setInterval(() => {
  if(Date.now() - lastMouseTime > 800) document.getElementById('cur').classList.remove('active');
}, 800);

async function init() {
  video = document.getElementById('video');
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 640 } });
    video.srcObject = stream;
    await video.play();
  } catch (e) {
    addLog("CAMERA_ERROR: " + e.message, "rgba(255,100,100,0.8)");
  }

  hiddenCanvas = document.createElement('canvas');
  hiddenCanvas.width = 128; hiddenCanvas.height = 128;
  hiddenCtx = hiddenCanvas.getContext('2d', { willReadFrequently: true });

  tempCanvas = document.createElement('canvas');
  tempCanvas.width = 108; tempCanvas.height = 108;
  tempCtx = tempCanvas.getContext('2d', { willReadFrequently: true });

  scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x0a0a0a, 0.03);
  camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.z = 16;

  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  document.getElementById('container').appendChild(renderer.domElement);

  setupLighting();
  createBaseGrid();
  fitGridToScreen(); 

  document.getElementById('loading-overlay').style.opacity = '0';
  setTimeout(() => document.getElementById('loading-overlay').remove(), 1000);

  addLog("DESKTOP_PHYSICS_ENGINE INITIALIZED", "#fff");
  addLog("AWAITING_DELICATE_INTERVENTION...");
  
  animate();
}

function setupLighting() {
  const ambientLight = new THREE.AmbientLight(0x404040, 1.2); 
  scene.add(ambientLight);

  const dirLight = new THREE.DirectionalLight(0xffffff, 1.5); 
  dirLight.position.set(3, 10, 15);
  dirLight.castShadow = true;
  dirLight.shadow.mapSize.width = 2048;
  dirLight.shadow.mapSize.height = 2048;
  scene.add(dirLight);

  const wallGeo = new THREE.PlaneGeometry(100, 100);
  const wallMat = new THREE.MeshStandardMaterial({ color: 0x050505, roughness: 0.8, metalness: 0.2 });
  const wall = new THREE.Mesh(wallGeo, wallMat);
  wall.position.z = -1; 
  wall.receiveShadow = true;
  scene.add(wall);
}

function fitGridToScreen() {
  if (!mosaicGroup) return;
  const vFov = camera.fov * Math.PI / 180;
  const vHeight = 2 * Math.tan(vFov / 2) * camera.position.z;
  const vWidth = vHeight * camera.aspect;
  const targetSize = Math.min(vWidth, vHeight) * 0.85;
  const scale = targetSize / BASE_GRID_SIZE;
  mosaicGroup.scale.set(scale, scale, 1);
}

function createBaseGrid() {
  mosaicGroup = new THREE.Group();
  const step = BASE_GRID_SIZE / GRID_SIZE; 

  for (let y = 0; y < GRID_SIZE; y++) {
    for (let x = 0; x < GRID_SIZE; x++) {
      const mat = new THREE.MeshStandardMaterial({
        color: 0x0a0a0a, roughness: 1.0, side: THREE.DoubleSide
      });
      const mesh = new THREE.Mesh(paperGeo, mat);
      
      const baseX = (x - GRID_SIZE / 2 + 0.5) * step;
      const baseY = (GRID_SIZE / 2 - y - 0.5) * step;
      
      mesh.position.set(baseX, baseY, 0);
      mesh.receiveShadow = true;

      baseTiles.push({
        x: baseX, y: baseY, z: 0,
        gridX: x, gridY: y,
        windCharge: 0
      });
      
      cellStacks.push([]); 
      mosaicGroup.add(mesh);
    }
  }
  scene.add(mosaicGroup);
}

function createPaperTexture(processedImageData, isBlank) {
  if (isBlank) {
    hiddenCtx.fillStyle = '#999999'; // 空白便利貼的淡灰
    hiddenCtx.fillRect(0, 0, 128, 128);
    for(let i=0; i<400; i++) {
      hiddenCtx.fillStyle = `rgba(0,0,0,${Math.random()*0.05})`;
      hiddenCtx.fillRect(Math.random()*128, Math.random()*128, 2, 2);
    }
  } else {
    hiddenCtx.fillStyle = '#f2f2f2'; 
    hiddenCtx.fillRect(0, 0, 128, 128);
    for(let i=0; i<300; i++) {
      hiddenCtx.fillStyle = `rgba(0,0,0,${Math.random()*0.05})`;
      hiddenCtx.fillRect(Math.random()*128, Math.random()*128, 2, 2);
    }
    tempCtx.putImageData(processedImageData, 0, 0);
    hiddenCtx.drawImage(tempCanvas, 10, 10, 108, 108);
  }

  hiddenCtx.save();
  hiddenCtx.translate(64, 8); 
  hiddenCtx.rotate((Math.random() - 0.5) * 0.3); 
  hiddenCtx.fillStyle = 'rgba(235, 230, 190, 0.8)'; 
  hiddenCtx.fillRect(-20, -8, 40, 14);
  hiddenCtx.restore();

  const tex = new THREE.CanvasTexture(hiddenCanvas);
  tex.minFilter = THREE.LinearFilter;
  return tex;
}

function captureNextSector() {
  if (video.readyState !== video.HAVE_ENOUGH_DATA) return;

  const cellIndex = currentIndex % TOTAL_TILES;
  const cell = baseTiles[cellIndex];
  const stack = cellStacks[cellIndex];

  // 最多 6 層堆疊，超過則淘汰到底部廢棄紙張區 (但這次不刪除，而是變成散落紙張)
  if (stack.length >= 6) {
    const old = stack.shift();
    totalActiveLayers--;
    
    // 將舊紙張滑落到桌邊
    old.userData.vx = (Math.random()-0.5)*0.03;
    old.userData.vy = (Math.random()-0.5)*0.03;
    old.userData.vz = 0.05;
    blownPapers.push(old);
  }

  const isBlankAnomaly = Math.random() < 0.05;
  let imgData = null;

  if (!isBlankAnomaly) {
    const minSize = Math.min(video.videoWidth, video.videoHeight);
    const zoomFactor = 0.5 + Math.random() * 0.5;
    const cropSize = minSize * zoomFactor;
    const sx = Math.random() * (video.videoWidth - cropSize);
    const sy = Math.random() * (video.videoHeight - cropSize);

    tempCtx.drawImage(video, sx, sy, cropSize, cropSize, 0, 0, 108, 108);
    imgData = tempCtx.getImageData(0, 0, 108, 108);
    const data = imgData.data;
    const copy = new Uint8ClampedArray(data);

    for (let i = 0; i < data.length; i += 4) {
      let r = data[i], g = data[i + 1], b = data[i + 2];
      let lum = 0.299 * r + 0.587 * g + 0.114 * b;
      let noise = (Math.random() - 0.5) * 30;

      if (currentMode === 0) {
        let rIdx = i + 4, bIdx = i + 108 * 4;
        let rLum = rIdx < data.length ? (0.299*copy[rIdx] + 0.587*copy[rIdx+1] + 0.114*copy[rIdx+2]) : lum;
        let bLum = bIdx < data.length ? (0.299*copy[bIdx] + 0.587*copy[bIdx+1] + 0.114*copy[bIdx+2]) : lum;
        let val = (Math.abs(lum - rLum) + Math.abs(lum - bLum)) > 15 ? 255 : 20; 
        data[i] = data[i+1] = data[i+2] = val;
      } else if (currentMode === 1) {
        let val = (lum + (Math.random() - 0.5) * 120) > 128 ? 255 : 15;
        data[i] = data[i+1] = data[i+2] = val;
      } else if (currentMode === 2) {
        let pxIdx = (Math.random() > 0.95) ? i + Math.floor(Math.random() * 8) * 4 : i;
        if (pxIdx < data.length) {
          let sLum = 0.299*copy[pxIdx] + 0.587*copy[pxIdx+1] + 0.114*copy[pxIdx+2];
          data[i] = data[i+1] = data[i+2] = sLum > 100 ? 255 : 10;
        }
      } else if (currentMode === 3) {
        let val = lum * (Math.random() * 1.5) + noise;
        data[i] = data[i+1] = data[i+2] = val > 150 ? 240 : (val < 50 ? 10 : val);
      } else if (currentMode === 4) {
        data[i] = data[i+1] = data[i+2] = Math.floor((lum + noise) / 85) * 85;
      }
    }
  }

  const paperTex = createPaperTexture(imgData, isBlankAnomaly);
  const mat = new THREE.MeshStandardMaterial({ map: paperTex, color: 0xffffff, roughness: 0.9, side: THREE.DoubleSide });
  const mesh = new THREE.Mesh(paperGeo, mat);
  
  const offsetX = (Math.random() - 0.5) * 0.18;
  const offsetY = (Math.random() - 0.5) * 0.18;
  const tiltZ = (Math.random() - 0.5) * 0.3; 
  const zOffset = (stack.length + 1) * 0.12; 

  mesh.position.set(cell.x + offsetX, cell.y + offsetY, cell.z + zOffset);
  mesh.rotation.z = tiltZ;
  mesh.castShadow = true;
  mesh.receiveShadow = true;

  mesh.userData = {
    baseX: mesh.position.x, baseY: mesh.position.y, baseZ: mesh.position.z, baseTilt: tiltZ,
    targetRotX: 0, targetZ: mesh.position.z, targetRotY: 0,
    noiseSeed: Math.random() * 100,
    stackIndex: stack.length
  };

  mesh.rotation.x = Math.PI; 
  mesh.position.z += 1.0; 

  mosaicGroup.add(mesh);
  stack.push(mesh);
  totalActiveLayers++;

  document.getElementById('ui-progress').innerText = totalActiveLayers;
  
  if (isBlankAnomaly) {
    document.getElementById('ui-mode').innerText = "BLANK_ANOMALY";
  } else {
    document.getElementById('ui-mode').innerText = MODE_NAMES[currentMode];
    currentMode = (currentMode + 1) % 5;
  }
  
  currentIndex++;
}

function wipeBoard() {
  cellStacks.forEach(stack => {
    stack.forEach(p => {
      mosaicGroup.remove(p);
      if(p.material.map) p.material.map.dispose();
      p.material.dispose();
    });
    stack.length = 0;
  });
  blownPapers.forEach(p => {
    mosaicGroup.remove(p);
    if(p.material.map) p.material.map.dispose();
    p.material.dispose();
  });
  blownPapers.length = 0;
  totalActiveLayers = 0;
  addLog("DESK_CLEARED_MANUALLY.", "#f00");
}

function animate() {
  requestAnimationFrame(animate);
  const now = performance.now();
  const delta = (now - lastTime) * 0.001; 
  lastTime = now;
  const time = now * 0.001;
  
  const interval = 80 + (1 - speedRatio) * 600; 

  if (Date.now() - lastCaptureTime > interval) {
    captureNextSector();
    lastCaptureTime = Date.now();
  }

  // 1. 動態追蹤：極度遲鈍的反應
  if (Date.now() - lastMouseTime > 2000) {
    const c = document.getElementById('mc');
    if(video && video.readyState >= 2){
      const ctx = c.getContext('2d');
      ctx.drawImage(video, 0, 0, c.width, c.height);
      const curr = ctx.getImageData(0, 0, c.width, c.height);
      
      if(prevFrame){
        let tx=0, ty=0, count=0;
        for(let i=0; i<curr.data.length; i+=4){
          const diff = (Math.abs(curr.data[i]-prevFrame.data[i]) + Math.abs(curr.data[i+1]-prevFrame.data[i+1]) + Math.abs(curr.data[i+2]-prevFrame.data[i+2]))/3;
          if(diff > 40){ // 降低敏感度
            const idx = i/4; 
            tx += idx % c.width; ty += Math.floor(idx / c.width); 
            count++; 
          }
        }
        if(count > 25){ // 需要更大的動作才能觸發
          let nx = 1.0 - (tx/count/c.width); 
          vs.tx = nx * window.innerWidth; 
          vs.ty = (ty/count/c.height) * window.innerHeight;
          document.getElementById('cur').classList.add('active');
        } else {
          document.getElementById('cur').classList.remove('active');
        }
      }
      if(!prevFrame) prevFrame = new ImageData(c.width, c.height);
      prevFrame.data.set(curr.data);
    }
  }

  // 光環座標平滑化：極度緩慢跟隨
  vs.cx += (vs.tx - vs.cx) * 0.05;
  vs.cy += (vs.ty - vs.cy) * 0.05;
  document.getElementById('cur').style.left = vs.cx + 'px';
  document.getElementById('cur').style.top = vs.cy + 'px';

  let currentCursorVel = Math.sqrt(mouseVx*mouseVx + mouseVy*mouseVy);
  mouseVx *= 0.5; // 極速衰減滑鼠速度
  mouseVy *= 0.5;

  const vFov = camera.fov * Math.PI / 180;
  const vHeight = 2 * Math.tan(vFov / 2) * camera.position.z;
  const vWidth = vHeight * camera.aspect;
  const targetSize = Math.min(vWidth, vHeight) * 0.85;
  const scale = targetSize / BASE_GRID_SIZE;

  const wx = (((vs.cx / window.innerWidth) * 2 - 1) * (vWidth / 2)) / scale;
  const wy = (-((vs.cy / window.innerHeight) * 2 - 1) * (vHeight / 2)) / scale;
  
  const blowRadius = 2.0; 
  const PEEL_THRESHOLD = 2.0; // 需要累積更久才能掀開

  // 2. 極度輕柔的掀紙引擎 (Hover-to-Peel)
  for(let i=0; i<TOTAL_TILES; i++) {
    const cell = baseTiles[i];
    const stack = cellStacks[i];

    if(stack.length > 0) {
      const topPaper = stack[stack.length - 1];
      const dx = cell.x - wx;
      const dy = cell.y - wy;
      const dist = Math.sqrt(dx*dx + dy*dy);
      
      if (dist < blowRadius) {
        // 核心改變：移動越快，穩定度越低，越無法掀開紙張 (必須慢慢看)
        let hoverStability = Math.max(0, 1.0 - currentCursorVel * 0.1);
        cell.windCharge += delta * hoverStability * (1.0 - dist/blowRadius);
      } else {
        cell.windCharge = Math.max(0, cell.windCharge - delta * 0.5);
      }

      const chargeRatio = Math.min(1, cell.windCharge / PEEL_THRESHOLD);

      // 顫動預兆 (非常輕微的翹起)
      if (chargeRatio > 0 && chargeRatio < 1.0) {
        topPaper.userData.targetZ = topPaper.userData.baseZ + chargeRatio * 0.2;
        topPaper.userData.targetRotX = Math.sin(time * 20 + topPaper.userData.noiseSeed) * 0.05 * chargeRatio;
      } else {
        topPaper.userData.targetZ = topPaper.userData.baseZ;
        topPaper.userData.targetRotX = 0;
      }

      // --- 突破臨界：輕柔剝離並散落周圍 ---
      if (cell.windCharge >= PEEL_THRESHOLD) {
        stack.pop(); 
        totalActiveLayers--;
        document.getElementById('ui-progress').innerText = totalActiveLayers;

        // 賦予極弱的推移力量，讓它只散落在原位附近
        topPaper.userData.vx = -(dx / dist) * 0.01 + (Math.random()-0.5)*0.01;
        topPaper.userData.vy = -(dy / dist) * 0.01 + (Math.random()-0.5)*0.01;
        topPaper.userData.vz = 0.06; // 輕微抬起
        
        topPaper.userData.rvX = (Math.random() - 0.5) * 0.02; 
        topPaper.userData.rvY = (Math.random() - 0.5) * 0.02;
        topPaper.userData.rvZ = (Math.random() - 0.5) * 0.05;

        blownPapers.push(topPaper);
        cell.windCharge = 0; 
        
        if(Math.random() > 0.8) addLog(`LAYER_DELICATELY_PEELED`, "rgba(255,255,255,0.4)");
      }
    }

    stack.forEach((paper, idx) => {
      const u = paper.userData;
      let rX = u.targetRotX; let tZ = u.targetZ;
      if (idx !== stack.length - 1) { rX = 0; tZ = u.baseZ; }

      paper.rotation.x += (rX - paper.rotation.x) * 0.1;
      paper.rotation.y += (u.targetRotY - paper.rotation.y) * 0.1;
      paper.rotation.z = u.baseTilt; 
      paper.position.z += (tZ - paper.position.z) * 0.1;
    });
  }

  // 3. 散落桌面的相紙 (不消失，留在底層)
  for(let i=0; i<blownPapers.length; i++) {
    const p = blownPapers[i];
    const u = p.userData;
    
    // 讓散落的紙張落到 Z=-0.2 (剛好在網格底層下方，但高於桌面)
    if (p.position.z > u.baseZ - 0.2) {
      u.vz -= 0.003; // 極輕的重力
    } else {
      // 落地後的高摩擦力，紙張幾乎停在原地附近
      p.position.z = u.baseZ - 0.2;
      u.vz = 0;
      u.vx *= 0.8; 
      u.vy *= 0.8;
      u.rvX *= 0.8;
      u.rvY *= 0.8;
      u.rvZ *= 0.9;
    }

    p.position.x += u.vx;
    p.position.y += u.vy;
    p.position.z += u.vz;
    p.rotation.x += u.rvX;
    p.rotation.y += u.rvY;
    p.rotation.z += u.rvZ;
  }
  
  // 限制散落相紙總數，防止效能崩潰 (上限60張，超過則淘汰最舊的)
  document.getElementById('ui-scattered').innerText = blownPapers.length;
  if (blownPapers.length > 60) {
    const oldest = blownPapers.shift();
    mosaicGroup.remove(oldest);
    if(oldest.material.map) oldest.material.map.dispose();
    oldest.material.dispose();
  }

  document.getElementById('cur').style.left = vs.cx + 'px';
  document.getElementById('cur').style.top = vs.cy + 'px';

  renderer.render(scene, camera);
}

function addLog(m, color = "rgba(255,255,255,0.7)") {
  const lb = document.getElementById('log-box');
  const d = document.createElement('div');
  d.style.color = color;
  d.innerHTML = `> <span style="opacity:0.3">${new Date().toLocaleTimeString()}</span> ${m}`;
  lb.prepend(d);
  if(lb.children.length > 25) lb.lastChild.remove();
}

function setupKnob(id, callback) {
  const knob = document.getElementById(id);
  const needle = knob.querySelector('.needle');
  let dragging = false; let startY = 0; let currentVal = speedRatio;

  const update = (y) => {
    const delta = (startY - y) * 0.005;
    currentVal = Math.max(0, Math.min(1, currentVal + delta));
    needle.style.transform = `rotate(${(currentVal * 280) - 140}deg)`;
    callback(currentVal);
    startY = y;
  };

  knob.onmousedown = (e) => { dragging = true; startY = e.clientY; };
  window.onmousemove = (e) => { if(dragging) update(e.clientY); };
  window.onmouseup = () => dragging = false;
  knob.ontouchstart = (e) => { dragging = true; startY = e.touches[0].clientY; };
  window.ontouchmove = (e) => { if(dragging) update(e.touches[0].clientY); };
  window.ontouchend = () => dragging = false;
  
  needle.style.transform = `rotate(${(speedRatio * 280) - 140}deg)`;
}

setupKnob('knob-speed', (v) => { speedRatio = v; });
document.getElementById('btn-wipe').onclick = () => { wipeBoard(); };

window.onresize = () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  fitGridToScreen(); 
};

window.onload = init;
</script>

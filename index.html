<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>SELF_OBSERVER :: v64.0 REFINED_DESKTOP_ARCHIVE</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#0a0a0a;overflow:hidden;font-family:'Share Tech Mono',monospace;color:#ddd;user-select:none;touch-action:none;}

    #crt{pointer-events:none;position:fixed;inset:0;z-index:1000;
         background:linear-gradient(rgba(0,0,0,0) 50%, rgba(255,255,255,0.02) 50%),
                    linear-gradient(90deg, rgba(255,255,255,0.01), rgba(200,200,200,0.01));
         background-size:100% 4px, 3px 100%; opacity:0.6;}
         
    #vignette {
      pointer-events:none;position:fixed;inset:0;z-index:900;
      background: radial-gradient(circle at center, transparent 20%, rgba(0,0,0,0.95) 100%);
    }

    #cur {
      position:fixed; width:50px; height:50px; border:1px dashed rgba(255,255,255,0.3); border-radius:50%;
      z-index:700; pointer-events:none; transform:translate(-50%,-50%);
      transition: border-color 0.3s, background 0.3s, width 0.3s, height 0.3s;
      box-shadow: 0 0 20px rgba(255,255,255,0);
    }
    #cur.active {
      width:70px; height:70px; border-color:rgba(255,255,255,0.5); border-style: solid;
      background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%);
      box-shadow: 0 0 20px rgba(255,255,255,0.2);
    }

    #container{width:100vw;height:100vh; cursor:crosshair;}

    /* 側邊欄與收納開關 */
    #btn-toggle-panel {
      position: fixed; left: 20px; top: 20px; z-index: 850;
      background: rgba(8,8,8,0.9); border: 1px solid #fff; color: #fff;
      padding: 6px 10px; font-size: 9px; cursor: pointer; letter-spacing: 1px;
      transition: all 0.3s;
    }
    #btn-toggle-panel:hover { background: #fff; color: #000; }

    #sidebar{
      position:fixed; left:20px; top:60px; bottom:20px; width:220px;
      z-index:800; display:flex; flex-direction:column; gap:10px; pointer-events:none;
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s;
    }
    .panel{
      background:rgba(8,8,8,0.9); border-left:2px solid #fff;
      padding:12px; pointer-events:auto; box-shadow: 0 0 15px rgba(0,0,0,0.8);
    }
    .label{font-size:10px; color:rgba(255,255,255,0.4); letter-spacing:2px; margin-bottom:8px; display:block;}
    
    #video { width: 100%; filter: grayscale(100%) contrast(1.2) brightness(0.4); border: 1px solid rgba(255,255,255,0.1); }
    #mc { position:absolute; bottom:20px; left:20px; opacity:0; pointer-events:none; }
    
    #log-box{flex:1; font-size:9px; color:rgba(255,255,255,0.7); overflow-y:auto; line-height:1.6;}
    #scan-status { font-size: 10px; color: #fff; margin-top: 10px; border-top: 1px dashed rgba(255,255,255,0.3); padding-top: 10px; line-height: 1.8;}

    /* 控制面板縮小對齊 */
    #controls{
      position:fixed; right:20px; bottom:20px; z-index:950;
      display:flex; flex-direction:column; align-items:flex-end; gap:12px;
    }
    .knob-wrap{display:flex; flex-direction:column; align-items:center; gap:6px;}
    .knob{
      width:46px; height:46px; border-radius:50%; border:1px solid rgba(255,255,255,0.4);
      position:relative; cursor:ns-resize; background:radial-gradient(circle, #333 0%, #000 70%);
      box-shadow: 0 5px 10px rgba(0,0,0,0.5);
    }
    .needle{
      position:absolute; width:2px; height:45%; background:#fff;
      bottom:50%; left:calc(50% - 1px); transform-origin:bottom center;
      transition: transform 0.1s;
    }

    #status-bar{
      position:fixed; bottom:20px; left:260px; font-size:9px;
      color:rgba(255,255,255,0.3); letter-spacing:1px; z-index: 800;
      transition: transform 0.4s;
    }

    @media (max-width: 768px) {
      #status-bar { left: 20px; }
      #controls { right: 15px; bottom: 15px; transform: scale(0.85); transform-origin: bottom right; }
      #sidebar { top: 60px; width: 200px; }
    }

    /* 橫式手機適配 (避免控制列超出螢幕) */
    @media (max-height: 500px) and (orientation: landscape) {
      #controls {
        flex-direction: row; /* 橫向排列 */
        align-items: flex-end;
        bottom: 15px;
        right: env(safe-area-inset-right, 20px);
        transform: scale(0.85); transform-origin: bottom right;
      }
      #sidebar { top: 60px; width: 200px; }
    }

    #loading-overlay {
      position: fixed; inset: 0; background: #000; z-index: 2000;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      transition: opacity 1s;
    }
    .pulse { animation: pulse 1.5s infinite; color: #fff; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  </style>
</head>
<body>

<div id="loading-overlay">
  <div class="pulse text-xs tracking-[0.5em] mb-4">INITIALIZING_REFINED_ARCHIVE...</div>
  <div id="load-status" class="text-[10px] text-gray-500 font-mono">REMOVING_BASE_ARTIFACTS</div>
</div>

<div id="crt"></div>
<div id="vignette"></div>
<div id="cur"></div>

<!-- 新增：側邊欄收納開關 -->
<button id="btn-toggle-panel">[-] HIDE_LOG</button>

<div id="sidebar">
  <div class="panel">
    <span class="label">OPTICAL_SUBJECT</span>
    <video id="video" playsinline muted autoplay></video>
    <canvas id="mc" width="100" height="75"></canvas>
    <div id="scan-status">
      CYCLE_LAYER: <span id="ui-cycle" style="color:#0f0">1 / 5</span><br>
      ACTIVE_STACKS: <span id="ui-progress">0</span><br>
      SCATTERED_DEBRIS: <span id="ui-scattered">0</span><br>
      MODE: <span id="ui-mode">WAITING</span>
    </div>
  </div>
  <div class="panel flex-1">
    <span class="label">OBSERVATION_LOG</span>
    <div id="log-box"></div>
  </div>
</div>

<div id="controls">
  <div class="knob-wrap">
    <span class="label" style="font-size:8px;">SPEED</span>
    <div class="knob" id="knob-speed"><div class="needle" id="needle-speed"></div></div>
  </div>
  <div class="knob-wrap">
    <span class="label" style="font-size:8px;">SYS_MODE</span>
    <button id="btn-pause" class="w-11 h-11 border border-[#0f0] text-[#0f0] hover:bg-[#0f0] hover:text-black transition-all text-[8px] font-bold tracking-widest shadow-[0_5px_10px_rgba(0,255,0,0.1)]">PAUSE</button>
  </div>
  <div class="knob-wrap">
    <span class="label" style="font-size:8px;">FORMAT</span>
    <button id="btn-wipe" class="w-11 h-11 border border-white text-white hover:bg-white hover:text-black transition-all text-[8px] font-bold tracking-widest shadow-[0_5px_10px_rgba(0,0,0,0.5)]">RST</button>
  </div>
</div>

<div id="status-bar">v65.0_AI_SIMULACRA_ARCHIVE // CYCLE_BASED_GENERATION</div>

<div id="container"></div>

<script>
/**
 * SELF_OBSERVER v65.0
 * 新增：拍立得視覺 (Polaroid Aesthetic)、AI 生成影像異步載入、隨週期遞增的 AI 覆蓋率 (純粹擬像)。
 */

let video, hiddenCanvas, hiddenCtx, tempCanvas, tempCtx;
let scene, camera, renderer, mosaicGroup;
let baseTiles = []; 
let cellStacks = []; 
let blownPapers = []; 

// === AI 生成與提示詞庫 ===
const AI_PROMPTS = [
  "biometric neural scan",
  "x-ray anatomical skull",
  "digital ghost face",
  "pixelated surveillance data",
  "latent space hallucination",
  "cybernetic tissue blueprint"
];
let aiImagePool = [];

const TOTAL_TILES = 144; 
const MAX_CYCLES = 5; 
let COLS = 12;
let ROWS = 12;
let currentIndex = 0;
let currentMode = 0;
let totalActiveLayers = 0;

let speedRatio = 0.5;
let isPaused = false; 
let lastCaptureTime = 0;
let lastTime = performance.now();

let prevFrame = null;
const vs = { cx: window.innerWidth/2, cy: window.innerHeight/2, tx: window.innerWidth/2, ty: window.innerHeight/2 };
let mouseVx = 0, mouseVy = 0; 
let lastMouseTime = 0;

const MODE_NAMES = ["TOPOLOGICAL_EDGE", "DITHER_MATRIX", "THRESHOLD_SLICE", "NEURAL_NOISE", "QUANTIZED_PIXEL"];

// 拍立得幾何體比例 (稍微拉長)
const paperGeo = new THREE.PlaneBufferGeometry(0.85, 0.95);
const baseGeo = new THREE.PlaneBufferGeometry(0.7, 0.8);

const updateMouse = (x, y) => {
  lastMouseTime = Date.now();
  mouseVx = x - vs.tx;
  mouseVy = y - vs.ty;
  vs.tx = x;
  vs.ty = y;
  document.getElementById('cur').classList.add('active');
};

window.addEventListener('mousemove', e => updateMouse(e.clientX, e.clientY));
window.addEventListener('touchmove', e => {
  updateMouse(e.touches[0].clientX, e.touches[0].clientY);
}, {passive: false});

setInterval(() => {
  if(Date.now() - lastMouseTime > 500) document.getElementById('cur').classList.remove('active');
}, 500);

// 解決 iOS 手機按鈕 hover 需要點兩下的問題，並整合 Touch/Click
function bindBtn(id, callback) {
  const el = document.getElementById(id);
  if(!el) return;
  let triggered = false;
  const handler = (e) => {
    e.preventDefault(); 
    e.stopPropagation();
    if(triggered) return;
    triggered = true;
    callback();
    setTimeout(() => triggered = false, 300);
  };
  el.addEventListener('touchstart', handler, {passive: false});
  el.addEventListener('click', handler);
}

// 收納側邊欄邏輯 (手機預設收起)
let panelVisible = window.innerWidth > 768; 
const updatePanelUI = () => {
  const sb = document.getElementById('sidebar');
  const sbBtn = document.getElementById('btn-toggle-panel');
  const stBar = document.getElementById('status-bar');
  if (panelVisible) {
    sb.style.transform = 'translateX(0)';
    sb.style.opacity = '1';
    sb.style.pointerEvents = 'auto';
    sbBtn.innerText = "[-] HIDE_LOG";
    stBar.style.transform = 'translateX(0)';
  } else {
    sb.style.transform = 'translateX(-120%)';
    sb.style.opacity = '0';
    sb.style.pointerEvents = 'none';
    sbBtn.innerText = "[+] SHOW_LOG";
    stBar.style.transform = window.innerWidth > 768 ? 'translateX(-240px)' : 'translateX(-10px)';
  }
};
updatePanelUI(); // 初始執行

// 異步載入 AI 影像 (背景執行不卡頓)
async function initAIFetcher() {
  const fetchNext = async () => {
    if(aiImagePool.length < 10) {
      try {
        const prompt = AI_PROMPTS[Math.floor(Math.random() * AI_PROMPTS.length)];
        const seed = Math.floor(Math.random() * 99999);
        const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt + ", dark black and white, highly detailed, contrast")}?width=128&height=128&nologo=true&seed=${seed}`;
        const img = new Image();
        img.crossOrigin = "anonymous";
        await new Promise((resolve, reject) => {
          img.onload = resolve;
          img.onerror = reject;
          img.src = url;
        });
        aiImagePool.push({ img, prompt, seed });
      } catch(e) {}
    }
    setTimeout(fetchNext, 3000 + Math.random() * 3000);
  };
  for(let i=0; i<4; i++) fetchNext(); // 啟動4個併發抓取器
}

bindBtn('btn-toggle-panel', () => {
  panelVisible = !panelVisible;
  updatePanelUI();
});

function calculateGridLayout() {
  const aspect = window.innerWidth / window.innerHeight;
  const clampedAspect = Math.max(0.4, Math.min(2.5, aspect));
  COLS = Math.max(1, Math.round(Math.sqrt(TOTAL_TILES * clampedAspect)));
  ROWS = Math.ceil(TOTAL_TILES / COLS);
}

async function init() {
  video = document.getElementById('video');
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 640 }, audio: false });
    video.srcObject = stream;
    await video.play();
  } catch (e) {
    addLog("CAMERA_ERROR: " + e.message, "rgba(255,100,100,0.8)");
  }

  calculateGridLayout();
  initAIFetcher();

  hiddenCanvas = document.createElement('canvas');
  hiddenCanvas.width = 160; hiddenCanvas.height = 180; // 增加高度以容納拍立得文字與陰影
  hiddenCtx = hiddenCanvas.getContext('2d', { willReadFrequently: true });

  tempCanvas = document.createElement('canvas');
  tempCanvas.width = 108; tempCanvas.height = 108;
  tempCtx = tempCanvas.getContext('2d', { willReadFrequently: true });

  scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x0a0a0a, 0.03);
  camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.z = 16;

  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.shadowMap.enabled = false; 
  document.getElementById('container').appendChild(renderer.domElement);

  setupLighting();
  createBaseGrid();
  fitGridToScreen(); 

  document.getElementById('loading-overlay').style.opacity = '0';
  setTimeout(() => document.getElementById('loading-overlay').remove(), 1000);

  addLog("DESKTOP_UI REFINED", "#fff");
  
  animate();
}

function setupLighting() {
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.8); 
  scene.add(ambientLight);

  const dirLight = new THREE.DirectionalLight(0xffffff, 0.8); 
  dirLight.position.set(3, 10, 15);
  scene.add(dirLight);

  const wallGeo = new THREE.PlaneGeometry(100, 100);
  const wallMat = new THREE.MeshStandardMaterial({ color: 0x050505, roughness: 0.8 });
  const wall = new THREE.Mesh(wallGeo, wallMat);
  wall.position.z = -1; 
  scene.add(wall);
}

function fitGridToScreen() {
  if (!mosaicGroup) return;
  const vFov = camera.fov * Math.PI / 180;
  const vHeight = 2 * Math.tan(vFov / 2) * camera.position.z;
  const vWidth = vHeight * camera.aspect;
  
  const gridWidth = COLS * 1.0; 
  const gridHeight = ROWS * 1.0;

  const margin = window.innerWidth < 768 ? 0.95 : 0.85;
  const scaleX = (vWidth * margin) / gridWidth;
  const scaleY = (vHeight * margin) / gridHeight;
  const scale = Math.min(scaleX, scaleY);
  
  mosaicGroup.scale.set(scale, scale, 1);
}

function createBaseGrid() {
  mosaicGroup = new THREE.Group();
  const step = 1.0; 
  const startX = -(COLS - 1) * step / 2;
  const startY = (ROWS - 1) * step / 2;

  for (let i = 0; i < TOTAL_TILES; i++) {
    const x = i % COLS;
    const y = Math.floor(i / COLS);

    // 核心修正：將虛擬底板設為 invisible，徹底解決下方透出的黑塊問題
    const mat = new THREE.MeshBasicMaterial({ visible: false });
    const mesh = new THREE.Mesh(baseGeo, mat);
    
    const baseX = startX + x * step;
    const baseY = startY - y * step;
    
    mesh.position.set(baseX, baseY, 0);

    baseTiles.push({
      x: baseX, y: baseY, z: 0,
      gridX: x, gridY: y,
      windCharge: 0
    });
    
    cellStacks.push([]); 
    mosaicGroup.add(mesh);
  }
  scene.add(mosaicGroup);
}

function createPaperTexture(processedImageData, isBlank, aiImgObj, blendRatio, cycle) {
  hiddenCtx.clearRect(0, 0, 160, 180);

  // 陰影
  hiddenCtx.shadowColor = 'rgba(0, 0, 0, 0.7)';
  hiddenCtx.shadowBlur = 12;
  hiddenCtx.shadowOffsetX = 3;
  hiddenCtx.shadowOffsetY = 6;
  
  // 紙張底色
  hiddenCtx.fillStyle = isBlank ? '#999999' : '#f2f2f2';
  hiddenCtx.fillRect(16, 12, 128, 148);

  hiddenCtx.shadowColor = 'transparent';

  // 紙張雜訊
  for(let i=0; i<300; i++) {
    hiddenCtx.fillStyle = `rgba(0,0,0,${Math.random()*0.05})`;
    hiddenCtx.fillRect(16 + Math.random()*128, 12 + Math.random()*148, 2, 2);
  }

  // 貼上攝影機處理影像
  if (!isBlank) {
    tempCtx.putImageData(processedImageData, 0, 0);
    hiddenCtx.drawImage(tempCanvas, 24, 20, 112, 112);
    
    // 核心：疊加 AI 生成影像 (擬像化)
    if (aiImgObj && blendRatio > 0) {
      hiddenCtx.globalAlpha = blendRatio;
      // 混合模式：利用疊加或濾色產生神經融合感，第五層時完全取代
      hiddenCtx.globalCompositeOperation = blendRatio >= 1 ? 'source-over' : 'screen';
      hiddenCtx.drawImage(aiImgObj.img, 24, 20, 112, 112);
      hiddenCtx.globalAlpha = 1.0;
      hiddenCtx.globalCompositeOperation = 'source-over';
    }
  }

  // 底部文字標籤 (AI 提示詞或狀態)
  hiddenCtx.fillStyle = 'rgba(0,0,0,0.7)';
  hiddenCtx.font = 'bold 8px "Share Tech Mono"';
  let label = isBlank ? "ANOMALY // NULL" : `C${cycle} // ${aiImgObj && blendRatio > 0 ? aiImgObj.prompt.substring(0, 16).toUpperCase() : 'OPTICAL_FEED'}`;
  hiddenCtx.fillText(label, 24, 150);

  // 膠帶
  hiddenCtx.save();
  hiddenCtx.translate(80, 18); 
  hiddenCtx.rotate((Math.random() - 0.5) * 0.3); 
  hiddenCtx.shadowColor = 'rgba(0,0,0,0.4)';
  hiddenCtx.shadowBlur = 4;
  hiddenCtx.shadowOffsetY = 2;
  hiddenCtx.fillStyle = 'rgba(235, 230, 190, 0.8)'; 
  hiddenCtx.fillRect(-20, -8, 40, 14);
  hiddenCtx.restore();

  const tex = new THREE.CanvasTexture(hiddenCanvas);
  tex.minFilter = THREE.LinearFilter;
  return tex;
}

function captureNextSector() {
  if (video.readyState !== video.HAVE_ENOUGH_DATA) return;

  if (currentIndex >= TOTAL_TILES * MAX_CYCLES) {
    addLog(`MAX_CAPACITY (${MAX_CYCLES}_LAYERS) REACHED. AUTO-PURGING.`, "#f00");
    wipeBoard();
    return;
  }

  const cellIndex = currentIndex % TOTAL_TILES;
  const cell = baseTiles[cellIndex];
  const stack = cellStacks[cellIndex];

  if (stack.length >= 6) {
    const old = stack.shift();
    totalActiveLayers--;
    old.userData.vx = (Math.random()-0.5)*0.03;
    old.userData.vy = (Math.random()-0.5)*0.03;
    old.userData.vz = 0.05;
    blownPapers.push(old);
  }

  const isBlankAnomaly = Math.random() < 0.05;
  let imgData = null;
  
  // 計算目前的 Cycle 以及 AI 混合率
  const currentCycle = Math.floor(currentIndex / TOTAL_TILES) + 1;
  // 第1層(0%), 第2層(25%), 第3層(50%), 第4層(75%), 第5層(100%完全取代)
  const blendRatio = (currentCycle - 1) * 0.25; 
  let selectedAI = null;
  if (aiImagePool.length > 0) {
    selectedAI = aiImagePool[Math.floor(Math.random() * aiImagePool.length)];
  }

  if (!isBlankAnomaly) {
    const minSize = Math.min(video.videoWidth, video.videoHeight);
    const zoomFactor = 0.5 + Math.random() * 0.5;
    const cropSize = minSize * zoomFactor;
    const sx = Math.random() * (video.videoWidth - cropSize);
    const sy = Math.random() * (video.videoHeight - cropSize);

    tempCtx.drawImage(video, sx, sy, cropSize, cropSize, 0, 0, 108, 108);
    imgData = tempCtx.getImageData(0, 0, 108, 108);
    const data = imgData.data;
    const copy = new Uint8ClampedArray(data);

    for (let i = 0; i < data.length; i += 4) {
      let r = data[i], g = data[i + 1], b = data[i + 2];
      let lum = 0.299 * r + 0.587 * g + 0.114 * b;
      let noise = (Math.random() - 0.5) * 30;

      if (currentMode === 0) {
        let rIdx = i + 4, bIdx = i + 108 * 4;
        let rLum = rIdx < data.length ? (0.299*copy[rIdx] + 0.587*copy[rIdx+1] + 0.114*copy[rIdx+2]) : lum;
        let bLum = bIdx < data.length ? (0.299*copy[bIdx] + 0.587*copy[bIdx+1] + 0.114*copy[bIdx+2]) : lum;
        let val = (Math.abs(lum - rLum) + Math.abs(lum - bLum)) > 15 ? 255 : 20; 
        data[i] = data[i+1] = data[i+2] = val;
      } else if (currentMode === 1) {
        let val = (lum + (Math.random() - 0.5) * 120) > 128 ? 255 : 15;
        data[i] = data[i+1] = data[i+2] = val;
      } else if (currentMode === 2) {
        let pxIdx = (Math.random() > 0.95) ? i + Math.floor(Math.random() * 8) * 4 : i;
        if (pxIdx < data.length) {
          let sLum = 0.299*copy[pxIdx] + 0.587*copy[pxIdx+1] + 0.114*copy[pxIdx+2];
          data[i] = data[i+1] = data[i+2] = sLum > 100 ? 255 : 10;
        }
      } else if (currentMode === 3) {
        let val = lum * (Math.random() * 1.5) + noise;
        data[i] = data[i+1] = data[i+2] = val > 150 ? 240 : (val < 50 ? 10 : val);
      } else if (currentMode === 4) {
        data[i] = data[i+1] = data[i+2] = Math.floor((lum + noise) / 85) * 85;
      }
    }
  }

  const paperTex = createPaperTexture(imgData, isBlankAnomaly, selectedAI, blendRatio, currentCycle);
  const mat = new THREE.MeshBasicMaterial({ map: paperTex, transparent: true, side: THREE.DoubleSide });
  const mesh = new THREE.Mesh(paperGeo, mat);
  
  const offsetX = (Math.random() - 0.5) * 0.15;
  const offsetY = (Math.random() - 0.5) * 0.15;
  const tiltZ = (Math.random() - 0.5) * 0.25; 
  const zOffset = (stack.length + 1) * 0.05; 

  mesh.position.set(cell.x + offsetX, cell.y + offsetY, cell.z + zOffset);
  mesh.rotation.z = tiltZ;

  mesh.userData = {
    baseX: mesh.position.x, baseY: mesh.position.y, baseZ: mesh.position.z, baseTilt: tiltZ,
    targetRotX: 0, targetZ: mesh.position.z, targetRotY: 0,
    noiseSeed: Math.random() * 100
  };

  mesh.rotation.x = Math.PI; 
  mesh.position.z += 1.0; 

  mosaicGroup.add(mesh);
  stack.push(mesh);
  totalActiveLayers++;
  currentIndex++;

  document.getElementById('ui-cycle').innerText = `${currentCycle} / ${MAX_CYCLES}`;
  document.getElementById('ui-progress').innerText = totalActiveLayers;
  
  if (isBlankAnomaly) {
    document.getElementById('ui-mode').innerText = "BLANK_ANOMALY";
  } else {
    document.getElementById('ui-mode').innerText = MODE_NAMES[currentMode];
    currentMode = (currentMode + 1) % 5;
  }
}

function wipeBoard() {
  cellStacks.forEach(stack => {
    stack.forEach(p => {
      mosaicGroup.remove(p);
      if(p.material.map) p.material.map.dispose();
      p.material.dispose();
    });
    stack.length = 0;
  });
  blownPapers.forEach(p => {
    mosaicGroup.remove(p);
    if(p.material.map) p.material.map.dispose();
    p.material.dispose();
  });
  blownPapers.length = 0;
  
  totalActiveLayers = 0;
  currentIndex = 0;
  currentMode = 0;
  
  document.getElementById('ui-cycle').innerText = `1 / ${MAX_CYCLES}`;
  document.getElementById('ui-progress').innerText = "0";
  document.getElementById('ui-scattered').innerText = "0";
  
  addLog("DESK_CLEARED. STARTING_NEW_CYCLE.", "#f00");
}

function animate() {
  requestAnimationFrame(animate);
  const now = performance.now();
  const delta = (now - lastTime) * 0.001; 
  lastTime = now;
  const time = now * 0.001;
  
  const interval = 80 + (1 - speedRatio) * 600; 

  if (!isPaused && Date.now() - lastCaptureTime > interval) {
    captureNextSector();
    lastCaptureTime = Date.now();
  }

  if (Date.now() - lastMouseTime > 1000) {
    const c = document.getElementById('mc');
    if(video && video.readyState >= 2){
      const ctx = c.getContext('2d');
      ctx.drawImage(video, 0, 0, c.width, c.height);
      const curr = ctx.getImageData(0, 0, c.width, c.height);
      
      if(prevFrame){
        let tx=0, ty=0, count=0;
        for(let i=0; i<curr.data.length; i+=4){
          const diff = (Math.abs(curr.data[i]-prevFrame.data[i]) + Math.abs(curr.data[i+1]-prevFrame.data[i+1]) + Math.abs(curr.data[i+2]-prevFrame.data[i+2]))/3;
          if(diff > 30){ 
            const idx = i/4; 
            tx += idx % c.width; ty += Math.floor(idx / c.width); 
            count++; 
          }
        }
        if(count > 15){ 
          let nx = 1.0 - (tx/count/c.width); 
          vs.tx = nx * window.innerWidth; 
          vs.ty = (ty/count/c.height) * window.innerHeight;
          document.getElementById('cur').classList.add('active');
        } else {
          document.getElementById('cur').classList.remove('active');
        }
      }
      if(!prevFrame) prevFrame = new ImageData(c.width, c.height);
      prevFrame.data.set(curr.data);
    }
  }

  vs.cx += (vs.tx - vs.cx) * 0.15;
  vs.cy += (vs.ty - vs.cy) * 0.15;
  document.getElementById('cur').style.left = vs.cx + 'px';
  document.getElementById('cur').style.top = vs.cy + 'px';

  let currentCursorVel = Math.sqrt(mouseVx*mouseVx + mouseVy*mouseVy);
  mouseVx *= 0.7; 
  mouseVy *= 0.7;

  const vFov = camera.fov * Math.PI / 180;
  const vHeight = 2 * Math.tan(vFov / 2) * camera.position.z;
  const vWidth = vHeight * camera.aspect;
  
  const margin = window.innerWidth < 768 ? 0.95 : 0.85;
  const scaleX = (vWidth * margin) / COLS;
  const scaleY = (vHeight * margin) / ROWS;
  const scale = Math.min(scaleX, scaleY);

  const wx = (((vs.cx / window.innerWidth) * 2 - 1) * (vWidth / 2)) / scale;
  const wy = (-((vs.cy / window.innerHeight) * 2 - 1) * (vHeight / 2)) / scale;
  
  const blowRadius = 2.0; 
  const PEEL_THRESHOLD = 0.8; 

  for(let i=0; i<TOTAL_TILES; i++) {
    const cell = baseTiles[i];
    const stack = cellStacks[i];

    if(stack.length > 0) {
      const topPaper = stack[stack.length - 1];
      const dx = cell.x - wx;
      const dy = cell.y - wy;
      const dist = Math.sqrt(dx*dx + dy*dy);
      
      if (dist < blowRadius) {
        let hoverStability = Math.max(0.2, 1.0 - currentCursorVel * 0.05);
        cell.windCharge += delta * hoverStability * (1.5 - dist/blowRadius);
      } else {
        cell.windCharge = Math.max(0, cell.windCharge - delta * 0.8);
      }

      const chargeRatio = Math.min(1, cell.windCharge / PEEL_THRESHOLD);

      if (chargeRatio > 0 && chargeRatio < 1.0) {
        topPaper.userData.targetZ = topPaper.userData.baseZ + chargeRatio * 0.2;
        topPaper.userData.targetRotX = Math.sin(time * 25 + topPaper.userData.noiseSeed) * 0.08 * chargeRatio;
      } else {
        topPaper.userData.targetZ = topPaper.userData.baseZ;
        topPaper.userData.targetRotX = 0;
      }

      if (cell.windCharge >= PEEL_THRESHOLD) {
        stack.pop(); 
        totalActiveLayers--;
        document.getElementById('ui-progress').innerText = totalActiveLayers;

        topPaper.userData.vx = -(dx / dist) * 0.02 + (Math.random()-0.5)*0.015;
        topPaper.userData.vy = -(dy / dist) * 0.02 + (Math.random()-0.5)*0.015;
        topPaper.userData.vz = 0.05; 
        
        topPaper.userData.rvX = (Math.random() - 0.5) * 0.02; 
        topPaper.userData.rvY = (Math.random() - 0.5) * 0.02;
        topPaper.userData.rvZ = (Math.random() - 0.5) * 0.06;

        blownPapers.push(topPaper);
        cell.windCharge = 0; 
      }
    }

    stack.forEach((paper, idx) => {
      const u = paper.userData;
      let rX = u.targetRotX; let tZ = u.targetZ;
      if (idx !== stack.length - 1) { rX = 0; tZ = u.baseZ; }

      paper.rotation.x += (rX - paper.rotation.x) * 0.15;
      paper.rotation.y += (u.targetRotY - paper.rotation.y) * 0.15;
      paper.rotation.z = u.baseTilt; 
      paper.position.z += (tZ - paper.position.z) * 0.15;
    });
  }

  for(let i=0; i<blownPapers.length; i++) {
    const p = blownPapers[i];
    const u = p.userData;
    
    if (p.position.z > u.baseZ - 0.1) {
      u.vz -= 0.005; 
    } else {
      p.position.z = u.baseZ - 0.1; 
      u.vz = 0;
      u.vx *= 0.7; 
      u.vy *= 0.7;
      u.rvX *= 0.7;
      u.rvY *= 0.7;
      u.rvZ *= 0.8;
    }

    p.position.x += u.vx;
    p.position.y += u.vy;
    p.position.z += u.vz;
    p.rotation.x += u.rvX;
    p.rotation.y += u.rvY;
    p.rotation.z += u.rvZ;
  }
  
  document.getElementById('ui-scattered').innerText = blownPapers.length;
  if (blownPapers.length > 60) {
    const oldest = blownPapers.shift();
    mosaicGroup.remove(oldest);
    if(oldest.material.map) oldest.material.map.dispose();
    oldest.material.dispose();
  }

  document.getElementById('cur').style.left = vs.cx + 'px';
  document.getElementById('cur').style.top = vs.cy + 'px';

  renderer.render(scene, camera);
}

function addLog(m, color = "rgba(255,255,255,0.7)") {
  const lb = document.getElementById('log-box');
  const d = document.createElement('div');
  d.style.color = color;
  d.innerHTML = `> <span style="opacity:0.3">${new Date().toLocaleTimeString()}</span> ${m}`;
  lb.prepend(d);
  if(lb.children.length > 25) lb.lastChild.remove();
}

bindBtn('btn-pause', () => {
  isPaused = !isPaused;
  const btn = document.getElementById('btn-pause');
  
  if (isPaused) {
    btn.innerText = "RESUME";
    btn.className = "w-11 h-11 border border-[#f00] text-[#f00] hover:bg-[#f00] hover:text-black transition-all text-[8px] font-bold tracking-widest shadow-[0_5px_10px_rgba(255,0,0,0.2)]";
    addLog("GENERATION_PAUSED.", "#f00");
    document.getElementById('ui-mode').innerText = "PAUSED_FOR_INVESTIGATION";
    document.getElementById('ui-mode').style.color = "#f00";
  } else {
    btn.innerText = "PAUSE";
    btn.className = "w-11 h-11 border border-[#0f0] text-[#0f0] hover:bg-[#0f0] hover:text-black transition-all text-[8px] font-bold tracking-widest shadow-[0_5px_10px_rgba(0,255,0,0.1)]";
    addLog("GENERATION_RESUMED.", "#0f0");
    document.getElementById('ui-mode').innerText = MODE_NAMES[currentMode];
    document.getElementById('ui-mode').style.color = "#fff";
  }
});

function setupKnob(id, callback) {
  const knob = document.getElementById(id);
  const needle = knob.querySelector('.needle');
  let dragging = false; let startY = 0; let currentVal = speedRatio;

  const update = (y) => {
    const delta = (startY - y) * 0.005;
    currentVal = Math.max(0, Math.min(1, currentVal + delta));
    needle.style.transform = `rotate(${(currentVal * 280) - 140}deg)`;
    callback(currentVal);
    startY = y;
  };

  knob.onmousedown = (e) => { dragging = true; startY = e.clientY; };
  window.onmousemove = (e) => { if(dragging) update(e.clientY); };
  window.onmouseup = () => dragging = false;
  knob.ontouchstart = (e) => { dragging = true; startY = e.touches[0].clientY; };
  window.ontouchmove = (e) => { if(dragging) update(e.touches[0].clientY); };
  window.ontouchend = () => dragging = false;
  
  needle.style.transform = `rotate(${(speedRatio * 280) - 140}deg)`;
}

setupKnob('knob-speed', (v) => { speedRatio = v; });
bindBtn('btn-wipe', () => { wipeBoard(); });

window.onresize = () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  fitGridToScreen(); 
};

window.onload = init;
</script>
